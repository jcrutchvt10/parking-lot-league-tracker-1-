services:
  - type: web
    name: parking-lot-league-tracker
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /
    buildCommand: npm install; npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_READ_ONLY
        value: "true"
